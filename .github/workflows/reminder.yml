name: Daily Wechat Reminders

on:
  schedule:
    # UTC时间, 比北京时间少8小时
    - cron: '5 22 * * *'   # 06:05 北京时间
    - cron: '30 1 * * *'   # 09:30 北京时间
    - cron: '5 10 * * *'   # 18:05 北京时间
    - cron: '20 13 * * *'  # 21:20 北京时间

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Set reminder title and content
        run: |
          echo "REMIND_TITLE=打卡提醒" >> $GITHUB_ENV
          case ${{ github.event.schedule }} in
            "5 22 * * *") echo "REMIND_DESP=早安，记得6:05打卡！" >> $GITHUB_ENV;;
            "30 1 * * *") echo "REMIND_DESP=上午好，记得9:30打卡！" >> $GITHUB_ENV;;
            "5 10 * * *") echo "REMIND_DESP=下午好，记得18:05打卡！" >> $GITHUB_ENV;;
            "20 13 * * *") echo "REMIND_DESP=晚上好，记得21:20打卡！" >> $GITHUB_ENV;;
          esac
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install requests
        run: pip install requests
          
      - name: Send Wechat Reminder
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          REMIND_TITLE: ${{ env.REMIND_TITLE }}
          REMIND_DESP: ${{ env.REMIND_DESP }}
        run: python wechat_reminder.py
